/* ══════════════════════════════════════════════════════
   IPMN DESIGN SYSTEM — Modifiez les couleurs ici
   ══════════════════════════════════════════════════════ */
:root {
  /* Couleurs principales — changez --gold pour la couleur de l'école */
  --bg:   #08101f;
  --s1:   #0d1828;
  --s2:   #121f34;
  --s3:   #182740;
  --gold: #b8860b;   /* ← couleur principale IPMN */
  --g2:   #d4a017;
  --gdim: rgba(184,134,11,.13);
  --tx:   #e2d9c8;
  --sub:  #7a8899;
  --w:    #f5f0e8;
  --ok:   #22c55e;
  --err:  #ef4444;
  --info: #3b82f6;
  --warn: #f59e0b;
  --r:9px; --rs:5px;
  --sh:0 6px 28px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Playfair Display',serif;color:var(--w)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* ── LAYOUT ── */
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--s1);border-right:1px solid rgba(184,134,11,.14);
  display:flex;flex-direction:column;position:fixed;inset-y:0;left:0;z-index:90;overflow-y:auto}
.sb-logo{padding:18px 15px 14px;border-bottom:1px solid rgba(184,134,11,.1);text-align:center}
.sb-logo .logo-icon{font-size:2.2rem;margin-bottom:4px}
.sb-logo h2{color:var(--gold);font-size:.92rem;letter-spacing:.06em;line-height:1.3}
.sb-logo p{color:var(--sub);font-size:.63rem;margin-top:2px}
.sb-logo .badge-ipmn{background:var(--gdim);border:1px solid rgba(184,134,11,.25);color:var(--gold);
  font-size:.6rem;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:5px}
.sb-nav{padding:8px 7px;flex:1}
.sb-sec{color:var(--sub);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 8px 3px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:var(--rs);
  cursor:pointer;transition:all .15s;color:var(--sub);font-size:.81rem;font-weight:500;margin-bottom:1px}
.sb-item:hover{background:var(--gdim);color:var(--tx)}
.sb-item.on{background:rgba(184,134,11,.19);color:var(--gold)}
.sb-item .ic{font-size:.88rem;width:16px;text-align:center;flex-shrink:0}
.sb-item .pill{margin-left:auto;background:var(--err);color:#fff;font-size:.57rem;
  font-weight:700;padding:1px 5px;border-radius:20px}
.sb-foot{padding:11px 12px;border-top:1px solid rgba(184,134,11,.1);display:flex;align-items:center;gap:8px}
.main{margin-left:248px;display:flex;flex-direction:column;min-height:100vh;flex:1}
.topbar{background:var(--s1);border-bottom:1px solid rgba(184,134,11,.08);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.topbar h1{font-size:1.15rem}
.page{padding:22px 24px;flex:1}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid rgba(184,134,11,.1);border-radius:var(--r);padding:17px;box-shadow:var(--sh)}
.ci{background:var(--s2);border:1px solid rgba(255,255,255,.05);border-radius:var(--rs);padding:13px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-bottom:18px}
.sc{background:var(--s2);border:1px solid rgba(184,134,11,.1);border-radius:var(--r);
  padding:15px;position:relative;overflow:hidden;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent)}
.sc-n{font-size:1.8rem;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif}
.sc-l{color:var(--sub);font-size:.7rem;margin-top:2px}
.sc-i{position:absolute;right:11px;top:11px;font-size:1.4rem;opacity:.13}

/* ── TABLE ── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid rgba(184,134,11,.1)}
table{width:100%;border-collapse:collapse}
thead{background:rgba(184,134,11,.07)}
th{padding:9px 13px;text-align:left;color:var(--gold);font-size:.66rem;
  letter-spacing:.09em;text-transform:uppercase;font-weight:600;white-space:nowrap}
td{padding:9px 13px;font-size:.82rem;border-top:1px solid rgba(255,255,255,.04)}
tr:hover td{background:rgba(184,134,11,.03)}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600;white-space:nowrap}
.c-ok{background:rgba(34,197,94,.13);color:var(--ok)}
.c-err{background:rgba(239,68,68,.13);color:var(--err)}
.c-info{background:rgba(59,130,246,.13);color:var(--info)}
.c-warn{background:rgba(245,158,11,.13);color:var(--warn)}
.c-gold{background:rgba(184,134,11,.15);color:var(--gold)}
.c-purple{background:rgba(139,92,246,.13);color:#a78bfa}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fg.full{grid-column:1/-1}
label{font-size:.72rem;color:var(--sub);font-weight:500}
input,select,textarea{background:var(--s2);border:1px solid rgba(184,134,11,.18);border-radius:var(--rs);
  padding:7px 10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.82rem;
  outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.09)}
input::placeholder{color:var(--sub)}
select option{background:var(--s2)}
textarea{resize:vertical;min-height:72px}
input[type=checkbox],input[type=radio]{width:auto}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;
  transition:all .16s;white-space:nowrap;user-select:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.b-gold{background:linear-gradient(135deg,var(--gold),var(--g2));color:#fff}
.b-gold:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 4px 14px rgba(184,134,11,.4)}
.b-out{background:transparent;border:1px solid rgba(184,134,11,.28);color:var(--gold)}
.b-out:hover{background:var(--gdim)}
.b-ghost{background:transparent;color:var(--sub)}
.b-ghost:hover{color:var(--tx);background:rgba(255,255,255,.05)}
.b-err{background:rgba(239,68,68,.12);color:var(--err);border:1px solid rgba(239,68,68,.25)}
.b-info{background:rgba(59,130,246,.12);color:var(--info);border:1px solid rgba(59,130,246,.25)}
.b-ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.25)}
.b-sm{padding:4px 10px;font-size:.74rem}
.b-xs{padding:2px 7px;font-size:.67rem}
.b-ic{padding:5px}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.77);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:14px;animation:fi .17s}
.modal{background:var(--s1);border:1px solid rgba(184,134,11,.18);border-radius:12px;
  padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:su .2s ease-out}
.modal-lg{max-width:800px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── AUTH ── */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
  background:radial-gradient(ellipse at 30% 50%,rgba(184,134,11,.07) 0%,transparent 55%),var(--bg)}
.auth-card{width:100%;max-width:420px;background:var(--s1);border:1px solid rgba(184,134,11,.18);
  border-radius:14px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.tabs{display:flex;background:var(--s2);border-radius:var(--rs);overflow:hidden;margin-bottom:20px}
.tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:.82rem;font-weight:500;
  color:var(--sub);transition:all .18s}
.tab.on{background:var(--gold);color:#fff;font-weight:700}

/* ── SCHEDULE ── */
.sched{display:grid;grid-template-columns:52px repeat(5,1fr);
  border:1px solid rgba(184,134,11,.1);border-radius:var(--r);overflow:hidden;background:var(--s1)}
.sh-h{background:rgba(184,134,11,.07);padding:8px 4px;text-align:center;
  font-size:.66rem;font-weight:600;color:var(--gold);border-bottom:1px solid rgba(184,134,11,.1)}
.sh-t{background:rgba(0,0,0,.2);padding:4px;display:flex;align-items:center;justify-content:center;
  font-size:.6rem;color:var(--sub);border-bottom:1px solid rgba(255,255,255,.03);
  border-right:1px solid rgba(184,134,11,.08)}
.sh-c{padding:2px;border-bottom:1px solid rgba(255,255,255,.03);border-right:1px solid rgba(184,134,11,.04)}
.sh-b{border-radius:var(--rs);padding:4px 5px;font-size:.65rem;height:100%;
  display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:filter .14s;min-height:38px}
.sh-b:hover{filter:brightness(1.12)}

/* ── COMPTA COLORS ── */
.pay-ok{color:var(--ok);font-weight:700}
.pay-part{color:var(--warn);font-weight:700}
.pay-no{color:var(--err);font-weight:700}

/* ── MISC ── */
.row{display:flex;align-items:center}
.rowb{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.g1{gap:5px}.g2{gap:9px}.g3{gap:13px}.g4{gap:18px}
.mt1{margin-top:5px}.mt2{margin-top:10px}.mt3{margin-top:16px}.mt4{margin-top:22px}
.mb1{margin-bottom:5px}.mb2{margin-bottom:10px}.mb3{margin-bottom:16px}.mb4{margin-bottom:22px}
.sub{color:var(--sub);font-size:.78rem}
.gold{color:var(--gold)}
.pb{height:4px;background:var(--s3);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--gold),var(--g2));transition:width .4s}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;
  color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--g2));font-size:.75rem}
.divider{display:flex;align-items:center;gap:9px;color:var(--sub);font-size:.72rem;margin:13px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.empty{text-align:center;padding:40px 18px;color:var(--sub)}
.empty .ei{font-size:2.2rem;margin-bottom:9px;opacity:.35}
.tag{background:var(--s3);border:1px solid rgba(255,255,255,.07);color:var(--sub);
  font-size:.64rem;padding:2px 7px;border-radius:20px}
.err-box{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.22);
  border-radius:var(--rs);padding:8px 12px;font-size:.78rem;color:var(--err);margin-bottom:12px}
.ok-box{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);
  border-radius:var(--rs);padding:8px 12px;font-size:.78rem;color:var(--ok);margin-bottom:12px}
.info-box{background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.22);
  border-radius:var(--rs);padding:10px 14px;font-size:.8rem;color:var(--info)}
.toast{position:fixed;bottom:16px;right:16px;z-index:300;
  background:var(--s2);border:1px solid rgba(184,134,11,.25);border-radius:var(--rs);
  padding:10px 15px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh);
  animation:su .2s ease-out;font-size:.82rem;max-width:310px}
.sep{height:1px;background:rgba(255,255,255,.06);margin:14px 0}
.code-block{background:var(--s3);border:1px solid rgba(184,134,11,.15);border-radius:var(--rs);

</style>

const fmtXAF = n => new Intl.NumberFormat('fr-GA',{style:'decimal'}).format(n) + " XAF";
const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "-";

const calcMoyNote = (notes) => {
  // Système palier IPMN : on prend max(p1, rp1) et p2 et dm
  let total=0, count=0;
  Object.entries(notes).forEach(([mat,n])=>{
    const coeff = (MATIERES_APC[mat]||{coeff:1}).coeff;
    const best_p1 = Math.max(n.p1||0, n.rp1||0);
    const vals = [best_p1, n.p2, n.dm].filter(x=>x && x>0);
    if (vals.length) { total += (vals.reduce((a,b)=>a+b,0)/vals.length)*coeff; count+=coeff; }
  });
  return count ? (total/count).toFixed(2) : "-";
};

const getNiveau = classe => CLASSES_IPMN.find(c=>c.nom===classe)?.niveau||"";

const getCycleStat = (students) => {
  const c1 = students.filter(s=>CLASSES_IPMN.find(c=>c.nom===s.classe)?.cycle==="1er Cycle").length;
  const c2 = students.filter(s=>CLASSES_IPMN.find(c=>c.nom===s.classe)?.cycle==="2nd Cycle").length;
  return {c1,c2};
};

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[]);
  const ic={success:"✅",error:"❌",info:"ℹ️",warn:"⚠️"};
  return <div className="toast"><span>{ic[type]||ic.info}</span><span style={{flex:1}}>{msg}</span>

}

  const save=()=>{
    if(!f.nom||!f.email){toast("Nom et email obligatoires","error");return;}
    if(modal==="add"){
      const id=`IPMN24-${String(Date.now()).slice(-5)}`;
      const mat=f.matricule||id;
      const emptyNotes={};Object.keys(MATIERES_APC).forEach(m=>emptyNotes[m]={p1:0,rp1:0,p2:0,dm:0});
      setStudents(p=>[...p,{...f,id,matricule:mat,di:new Date().toISOString().split("T")[0],
        notes:emptyNotes,paiements:{inscription:"non",tranche1:"non",tranche2:"non",tranche3:"non"}}]);
      toast("Élève inscrit avec succès","success");
    } else {
      setStudents(p=>p.map(s=>s.id===modal.id?{...s,...f}:s));
      toast("Élève modifié","success");
    }
    setModal(null);
  };
  const del=id=>{if(confirm("Supprimer cet élève ?")){{setStudents(p=>p.filter(s=>s.id!==id));toast("Supprimé","warn");}}};

  const niveaux=[...new Set(CLASSES_IPMN.map(c=>c.niveau))];
  const cycles=[...new Set(CLASSES_IPMN.map(c=>c.cycle))];

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Gestion des élèves</h2>
        <div className="sub">{list.length} / {students.length} élève(s)</div></div>
      <button className="btn b-gold" onClick={openAdd}>+ Inscrire un élève</button>
    </div>

    <div className="card mb3" style={{padding:"11px 15px"}}>
      <div className="row g2" style={{flexWrap:"wrap"}}>
        <input style={{width:210}} placeholder="🔍 Nom, matricule, email…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select style={{width:135}} value={fN} onChange={e=>setFN(e.target.value)}>
          <option value="">Tous niveaux</option>{niveaux.map(n=><option key={n}>{n}</option>)}</select>
        <select style={{width:155}} value={fC} onChange={e=>setFC(e.target.value)}>
          <option value="">Toutes classes</option>{CLASSES_IPMN.map(c=><option key={c.id}>{c.nom}</option>)}</select>
        <select style={{width:135}} value={fS} onChange={e=>setFS(e.target.value)}>
          <option value="">Tous statuts</option><option>Actif</option><option>Suspendu</option><option>Diplômé</option><option>En attente de validation</option></select>
        <button className="btn b-ghost b-sm" onClick={()=>{setSearch("");setFC("");setFN("");setFS("");}}>✕ Réinitialiser</button>
      </div>
    </div>

    <div className="tw">
      <table><thead><tr><th>Matricule</th><th>Élève</th><th>Classe</th><th>Niveau</th><th>Moy. gén.</th><th>T1</th><th>T2</th><th>Paiement</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody>
        {list.length===0?<tr><td colSpan={10}><div className="empty"><div className="ei">🔍</div>Aucun élève trouvé</div></td></tr>:
        list.map(s=>{
          const moy=calcMoyNote(s.notes||{});
          const p=s.paiements||{};
          return <tr key={s.id}>
            <td><span className="tag" style={{fontSize:".6rem"}}>{s.matricule}</span></td>
            <td><div className="row g2"><Av prenom={s.prenom||s.nom} nom={s.nom} size={28}/>
              <div style={{marginLeft:7}}>
                <div style={{fontWeight:500,fontSize:".81rem"}}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom}</div>
                <div className="sub" style={{fontSize:".68rem"}}>{s.email}</div>
              </div></div></td>
            <td style={{fontSize:".81rem"}}>{s.classe}</td>
            <td><span className="chip c-info">{getNiveau(s.classe)}</span></td>
            <td><span style={{fontWeight:700,color:nc(moy)}}>{moy}/20</span></td>
            <td><span className={`chip ${paiChip(p.tranche1)}`} style={{fontSize:".6rem"}}>{p.tranche1==="payé"?"✓":"✗"}</span></td>
            <td><span className={`chip ${paiChip(p.tranche2)}`} style={{fontSize:".6rem"}}>{p.tranche2==="payé"?"✓":p.tranche2==="partiel"?"~":"✗"}</span></td>
            <td><span className={`chip ${p.inscription==="payé"&&p.tranche1==="payé"?"c-ok":"c-warn"}`} style={{fontSize:".63rem"}}>
              {p.inscription==="payé"&&p.tranche1==="payé"?"À jour":"En retard"}</span></td>
            <td><span className={`chip ${sc_chip(s.statut)}`}>{s.statut}</span></td>
            <td><div className="row g1">
              <button className="btn b-info b-xs" onClick={()=>setDetail(s)}>👁️</button>
              <button className="btn b-out b-xs" onClick={()=>openEdit(s)}>✏️</button>
              <button className="btn b-err b-xs" onClick={()=>del(s.id)}>🗑️</button>
            </div></td>
          </tr>;
        })}
      </tbody></table>
    </div>

    {/* Modal ajout/edit */}
    {modal&&<Modal title={modal==="add"?"➕ Inscrire un élève":"✏️ Modifier l'élève"} onClose={()=>setModal(null)} large>
      <div className="fg2" style={{gap:11}}>
        <div className="fg"><label>Nom *</label><input value={f.nom||""} onChange={up("nom")}/></div>
        <div className="fg"><label>Prénom</label><input value={f.prenom||""} onChange={up("prenom")}/></div>
        <div className="fg full"><label>Email *</label><input type="email" value={f.email||""} onChange={up("email")}/></div>
        <div className="fg"><label>Matricule</label><input value={f.matricule||""} onChange={up("matricule")} placeholder="Auto-généré si vide"/></div>
        <div className="fg"><label>Téléphone</label><input value={f.tel||""} onChange={up("tel")}/></div>
        <div className="fg"><label>Date de naissance</label><input type="date" value={f.ddn||""} onChange={up("ddn")}/></div>
        <div className="fg"><label>Genre</label><select value={f.genre||"M"} onChange={up("genre")}><option value="M">Masculin</option><option value="F">Féminin</option></select></div>
        <div className="fg"><label>Classe</label><select value={f.classe||"5ème A"} onChange={up("classe")}>{CLASSES_IPMN.map(c=><option key={c.id}>{c.nom}</option>)}</select></div>
        <div className="fg"><label>Statut</label><select value={f.statut||"Actif"} onChange={up("statut")}><option>Actif</option><option>Suspendu</option><option>Diplômé</option><option>En attente de validation</option></select></div>
        <div className="fg"><label>Responsable légal</label><input value={f.responsable||""} onChange={up("responsable")}/></div>
        <div className="fg"><label>Tél. responsable</label><input value={f.tel_resp||""} onChange={up("tel_resp")}/></div>
      </div>
      <div className="row g2 mt3" style={{justifyContent:"flex-end"}}>
        <button className="btn b-ghost" onClick={()=>setModal(null)}>Annuler</button>
        <button className="btn b-gold" onClick={save}>{modal==="add"?"Inscrire":"Enregistrer"}</button>
      </div>
    </Modal>}

    {/* Modal détail élève */}
    {detail&&<Modal title={`Dossier — ${detail.prenom||""} ${detail.nom}`} onClose={()=>setDetail(null)} large>
      <div className="row g3 mb3">
        <Av prenom={detail.prenom||detail.nom} nom={detail.nom} size={56}/>
        <div>
          <div style={{fontWeight:700,fontSize:"1.1rem",color:"var(--w)"}}>{detail.prenom} {detail.nom}</div>
          <div className="sub">{detail.matricule} · {detail.classe} · Né(e) le {detail.ddn||"—"}</div>
          <div className="row g2 mt1">
            <span className={`chip ${sc_chip(detail.statut)}`}>{detail.statut}</span>
            <span className="chip c-info">{getNiveau(detail.classe)}</span>
          </div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"center",padding:"10px 18px",background:"var(--s2)",borderRadius:"var(--r)"}}>
          <div style={{fontSize:"1.9rem",fontWeight:700,color:nc(calcMoyNote(detail.notes||{}))}}>{calcMoyNote(detail.notes||{})}</div>
          <div className="sub" style={{fontSize:".7rem"}}>/20 Moy. générale</div>
        </div>
      </div>
      <div className="sep"/>
      <h4 style={{fontSize:".88rem",marginBottom:10}}>📊 Notes par matière (Paliers APC)</h4>
      <div style={{overflowX:"auto"}}>
        <table style={{fontSize:".75rem"}}><thead><tr><th>Matière</th><th>Coeff.</th><th>Palier 1</th><th>Ratt. P1</th><th>Palier 2</th><th>DM</th><th>Moy.</th></tr></thead>
        <tbody>{Object.entries(detail.notes||{}).map(([m,n])=>{
          const coeff=(MATIERES_APC[m]||{coeff:1}).coeff;
          const best=Math.max(n.p1||0,n.rp1||0);
          const vals=[best,n.p2,n.dm].filter(x=>x>0);
          const moy=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"-";
          return <tr key={m}>
            <td><span style={{color:MATIERES_APC[m]?.color||"var(--gold)",fontWeight:600}}>{m}</span></td>
            <td style={{textAlign:"center"}}>{coeff}</td>
            <td style={{textAlign:"center",color:nc(n.p1||0)}}>{n.p1||"-"}</td>
            <td style={{textAlign:"center",color:nc(n.rp1||0)}}>{n.rp1||"-"}</td>
            <td style={{textAlign:"center",color:nc(n.p2||0)}}>{n.p2||"-"}</td>
            <td style={{textAlign:"center",color:nc(n.dm||0)}}>{n.dm||"-"}</td>
            <td style={{textAlign:"center",fontWeight:700,color:nc(moy)}}>{moy}/20</td>
          </tr>;
        })}</tbody></table>
      </div>
      <div className="sep"/>
      <h4 style={{fontSize:".88rem",marginBottom:10}}>💰 Paiements</h4>
      <div className="fg2">
        {["inscription","tranche1","tranche2","tranche3"].map(k=>{
          const niv=getNiveau(detail.classe)||"5ème";
          const frais=FRAIS_SCOLARITE[niv]||FRAIS_SCOLARITE["5ème"];
          const labels={inscription:"Inscription",tranche1:"1ère tranche",tranche2:"2ème tranche",tranche3:"3ème tranche"};
          const montants={inscription:frais.inscription,tranche1:frais.tranche1,tranche2:frais.tranche2,tranche3:frais.tranche3};
          return <div className="ci" key={k} style={{borderLeft:`3px solid ${detail.paiements?.[k]==="payé"?"var(--ok)":detail.paiements?.[k]==="partiel"?"var(--warn)":"var(--err)"}`}}>
            <div style={{fontWeight:600,fontSize:".8rem"}}>{labels[k]}</div>
            <div className="sub" style={{fontSize:".7rem"}}>{fmtXAF(montants[k])}</div>
            <span className={`chip mt1 ${paiChip(detail.paiements?.[k]||"non")}`}>{paiLabel(detail.paiements?.[k]||"non")}</span>
          </div>;
        })}
      </div>
      <div className="row g2 mt3" style={{justifyContent:"flex-end"}}>
        <button className="btn b-out b-sm" onClick={()=>{openEdit(detail);setDetail(null);}}>✏️ Modifier le dossier</button>
        <button className="btn b-ghost b-sm" onClick={()=>setDetail(null)}>Fermer</button>
      </div>
    </Modal>}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   NOTES APC
   ══════════════════════════════════════════════════════════ */
function Notes(){
  const {students,setStudents,toast}=useApp();
  const [classe,setClasse]=useState("5ème A");
  const [matiere,setMatiere]=useState("Mathématiques");
  const [editing,setEditing]=useState(null);
  const [val,setVal]=useState("");

  const elv=students.filter(s=>s.classe===classe);
  const paliers=["p1","rp1","p2","dm"];
  const palierLabels={p1:"Palier 1",rp1:"Ratt. P1",p2:"Palier 2",dm:"Devoir Maison"};

  const startEdit=(sid,pal,cur)=>{setEditing({sid,pal});setVal(String(cur||""));};
  const commit=()=>{
    if(!editing)return;
    const n=val===""?0:parseFloat(val);
    if(isNaN(n)||n<0||n>20){toast("Note invalide (0-20)","error");setEditing(null);return;}
    setStudents(p=>p.map(s=>{
      if(s.id!==editing.sid)return s;
      const nn={...s.notes};nn[matiere]={...nn[matiere],[editing.pal]:n};
      return {...s,notes:nn};
    }));
    setEditing(null);toast("Note enregistrée ✓","success");
  };

  const moyClasse=(pal)=>{
    const vals=elv.map(s=>s.notes?.[matiere]?.[pal]||0).filter(x=>x>0);
    return vals.length?avg(vals):"-";
  };

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Notes APC — Paliers</h2>
        <div className="sub">Cliquez sur une note pour la modifier</div></div>
      <div className="row g2">
        <select style={{width:150}} value={classe} onChange={e=>setClasse(e.target.value)}>
          {CLASSES_IPMN.map(c=><option key={c.id}>{c.nom}</option>)}</select>
        <select style={{width:180}} value={matiere} onChange={e=>setMatiere(e.target.value)}>
          {Object.keys(MATIERES_APC).map(m=><option key={m}>{m}</option>)}</select>
      </div>
    </div>

    {/* Stats paliers */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
      {paliers.map(p=><div className="sc" key={p}>
        <div className="sc-n">{moyClasse(p)}</div>
        <div className="sc-l">Moy. {palierLabels[p]}</div>
      </div>)}
    </div>

    {/* Info matière */}
    <div className="ci mb3" style={{borderLeft:`3px solid ${MATIERES_APC[matiere]?.color||"var(--gold)"}`}}>
      <div className="row g3">
        <div style={{width:10,height:10,borderRadius:"50%",background:MATIERES_APC[matiere]?.color||"var(--gold)",flexShrink:0}}/>
        <span style={{fontWeight:600}}>{matiere}</span>
        <span className="sub">· Coefficient : {MATIERES_APC[matiere]?.coeff}</span>
        <span className="sub">· {elv.length} élèves · Classe : {classe}</span>
        <span className="sub" style={{marginLeft:"auto",fontSize:".7rem"}}>💡 Système APC : max(P1, Ratt.P1) + P2 + DM</span>
      </div>
    </div>

    <div className="tw">
      <table><thead><tr><th>#</th><th>Élève</th>
        {paliers.map(p=><th key={p} style={{textAlign:"center"}}>{palierLabels[p]}/20</th>)}
        <th style={{textAlign:"center"}}>Moy./20</th></tr></thead>
      <tbody>
        {elv.length===0?<tr><td colSpan={7}><div className="empty"><div className="ei">📊</div>Aucun élève dans cette classe</div></td></tr>:
        elv.map((s,i)=>{
          const n=s.notes?.[matiere]||{p1:0,rp1:0,p2:0,dm:0};
          const best=Math.max(n.p1||0,n.rp1||0);
          const vals=[best,n.p2,n.dm].filter(x=>x>0);
          const moy=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"-";
          return <tr key={s.id}>
            <td className="sub" style={{fontSize:".72rem"}}>{i+1}</td>
            <td><div className="row g2"><Av prenom={s.prenom||s.nom} nom={s.nom} size={26}/>
              <span style={{marginLeft:7,fontWeight:500,fontSize:".81rem"}}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom}</span></div></td>
            {paliers.map(pal=>(
              <td key={pal} style={{textAlign:"center"}}>
                {editing?.sid===s.id&&editing.pal===pal
                  ?<input style={{width:44,padding:"2px 4px",textAlign:"center",fontSize:".76rem"}}
                    value={val} onChange={e=>setVal(e.target.value)}
                    onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()} autoFocus/>
                  :<span onClick={()=>startEdit(s.id,pal,n[pal])}
                    style={{fontWeight:600,fontSize:".82rem",color:n[pal]>0?nc(n[pal]):"var(--sub)",
                      cursor:"pointer",background:"rgba(255,255,255,.04)",padding:"2px 7px",borderRadius:3,
                      display:"inline-block"}}>{n[pal]||"—"}</span>}
              </td>))}
            <td style={{textAlign:"center"}}>
              <span style={{fontWeight:700,fontSize:".9rem",color:nc(parseFloat(moy))}}>{moy}/20</span></td>
          </tr>;
        })}
      </tbody></table>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   CONSEIL DE CLASSE / PLANCHE SS
   ══════════════════════════════════════════════════════════ */
function ConseilClasse(){
  const {students}=useApp();
  const [classe,setClasse]=useState("5ème A");
  const [trim,setTrim]=useState("1er Trimestre");
  const [showPlanche,setShowPlanche]=useState(false);

  const elv=students.filter(s=>s.classe===classe)
    .map(s=>({...s,moy:parseFloat(calcMoyNote(s.notes||{}))||0}))
    .sort((a,b)=>b.moy-a.moy);

  const mention=m=>m>=16?"Très Bien":m>=14?"Bien":m>=12?"Assez Bien":m>=10?"Passable":"Insuffisant";
  const mentionColor=m=>m>=16?"var(--ok)":m>=14?"var(--ok)":m>=12?"var(--warn)":m>=10?"var(--gold)":"var(--err)";
  const total=elv.length;
  const admis=elv.filter(e=>e.moy>=10).length;
  const tauxRéussite=total?Math.round((admis/total)*100):0;
  const moyClasse=elv.length?avg(elv.map(e=>e.moy)):"-";

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Conseil de classe & Planche SS</h2>
        <div className="sub">Classement et résultats par classe</div></div>
      <div className="row g2">
        <select style={{width:130}} value={trim} onChange={e=>setTrim(e.target.value)}>
          <option>1er Trimestre</option><option>2ème Trimestre</option><option>3ème Trimestre</option></select>
        <select style={{width:150}} value={classe} onChange={e=>setClasse(e.target.value)}>
          {CLASSES_IPMN.map(c=><option key={c.id}>{c.nom}</option>)}</select>
        <button className="btn b-gold" onClick={()=>setShowPlanche(true)}>📋 Planche SS</button>
      </div>
    </div>

    {/* Statistiques */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
      {[
        {n:total,l:"Élèves",i:"🎒"},
        {n:admis,l:"Admis (≥10)",i:"✅"},
        {n:total-admis,l:"Non admis",i:"❌"},
        {n:`${tauxRéussite}%`,l:"Taux réussite",i:"📊"},
        {n:moyClasse,l:"Moyenne classe",i:"📈"},
      ].map((s,i)=><div className="sc" key={i}><div className="sc-i">{s.i}</div><div className="sc-n">{s.n}</div><div className="sc-l">{s.l}</div></div>)}
    </div>

    {/* Répartition mentions */}
    <div className="card mb3">
      <h3 style={{fontSize:".95rem",marginBottom:12}}>Répartition des mentions</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
        {[{l:"Très Bien",min:16,color:"#22c55e"},{l:"Bien",min:14,color:"#86efac"},{l:"Assez Bien",min:12,color:"#f59e0b"},{l:"Passable",min:10,color:"#fbbf24"},{l:"Insuffisant",min:0,color:"#ef4444"}].map(m=>{
          const cnt=elv.filter(e=>m.min===0?e.moy<10:e.moy>=m.min&&(m.min===16||e.moy<m.min+2)).length;
          const pct=total?Math.round((cnt/total)*100):0;
          return <div className="ci" key={m.l} style={{textAlign:"center",borderTop:`3px solid ${m.color}`}}>
            <div style={{fontWeight:700,fontSize:"1.5rem",color:m.color}}>{cnt}</div>
            <div style={{fontSize:".72rem",fontWeight:600,color:m.color}}>{m.l}</div>
            <div className="sub" style={{fontSize:".68rem"}}>{pct}%</div>
          </div>;
        })}
      </div>
    </div>

    {/* Classement */}
    <div className="tw">
      <table><thead><tr><th>Rang</th><th>Élève</th><th>Moy. gén.</th><th>Mention</th><th>Décision</th><th>Appréciation</th></tr></thead>
      <tbody>
        {elv.length===0?<tr><td colSpan={6}><div className="empty"><div className="ei">📊</div>Aucun élève</div></td></tr>:
        elv.map((s,i)=><tr key={s.id}>
          <td><span style={{fontWeight:700,color:i<3?"var(--gold)":"var(--sub)",fontSize:i<3?"1rem":".82rem"}}>
            {i<3?["🥇","🥈","🥉"][i]:i+1}</span></td>
          <td><div className="row g2"><Av prenom={s.prenom||s.nom} nom={s.nom} size={26}/>
            <span style={{marginLeft:7,fontWeight:500,fontSize:".81rem"}}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom}</span></div></td>
          <td><span style={{fontWeight:700,fontSize:"1rem",color:mentionColor(s.moy)}}>{s.moy.toFixed(2)}/20</span></td>
          <td><span className="chip" style={{background:`${mentionColor(s.moy)}22`,color:mentionColor(s.moy)}}>{mention(s.moy)}</span></td>
          <td><span className={`chip ${s.moy>=10?"c-ok":"c-err"}`}>{s.moy>=10?"Admis(e)":"Non admis(e)"}</span></td>
          <td><span className="sub" style={{fontSize:".76rem"}}>{s.moy>=16?"Excellent travail. Félicitations.":s.moy>=14?"Très bon trimestre. Encouragements.":s.moy>=12?"Bon travail. Continuer les efforts.":s.moy>=10?"Résultats satisfaisants. Peut mieux faire.":"Résultats insuffisants. Travail à améliorer."}</span></td>
        </tr>)}
      </tbody></table>
    </div>

    {/* PLANCHE SS */}
    {showPlanche&&<div className="ov" onClick={()=>setShowPlanche(false)}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxWidth:880}}>
        <div className="rowb mb3">
          <h3>📋 Planche — Conseil de Classe · {classe} · {trim}</h3>
          <div className="row g2">
            <button className="btn b-gold b-sm" onClick={()=>window.print()}>🖨️ Imprimer</button>
            <button className="btn b-ghost b-ic" onClick={()=>setShowPlanche(false)}>✕</button>
          </div>
        </div>
        {/* En-tête IPMN */}
        <div style={{border:"2px solid var(--gold)",borderRadius:"var(--r)",padding:16,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:".7rem",lineHeight:1.7}}>

/* ══════════════════════════════════════════════════════════
   COMPTABILITÉ
   ══════════════════════════════════════════════════════════ */
function Comptabilite(){
  const {students,setStudents,toast}=useApp();
  const [search,setSearch]=useState("");
  const [fC,setFC]=useState("");
  const [fPai,setFPai]=useState("");
  const [editPai,setEditPai]=useState(null);
  const [pForm,setPForm]=useState({});

  const list=students.filter(s=>{
    const q=`${s.prenom||""} ${s.nom} ${s.matricule}`.toLowerCase();
    const p=s.paiements||{};
    const enRetard=p.tranche1!=="payé"||p.tranche2!=="non"||p.inscription!=="payé";
    return q.includes(search.toLowerCase())&&(!fC||s.classe===fC)&&
      (fPai===""||
       (fPai==="ok"&&p.inscription==="payé"&&p.tranche1==="payé"&&p.tranche2==="payé")||
       (fPai==="retard"&&(p.tranche1!=="payé"||p.tranche2!=="partiel"))||
       (fPai==="zero"&&p.inscription!=="payé"));
  });

  // Calculs globaux
  const stats=students.reduce((acc,s)=>{
    const niv=getNiveau(s.classe)||"5ème";
    const f=FRAIS_SCOLARITE[niv]||FRAIS_SCOLARITE["5ème"];
    const p=s.paiements||{};
    acc.attendu+=f.inscription+f.tranche1+f.tranche2+f.tranche3;
    if(p.inscription==="payé")acc.percu+=f.inscription;
    if(p.tranche1==="payé")acc.percu+=f.tranche1;
    if(p.tranche2==="payé")acc.percu+=f.tranche2;
    if(p.tranche2==="partiel")acc.percu+=Math.round(f.tranche2/2);
    if(p.tranche3==="payé")acc.percu+=f.tranche3;
    return acc;
  },{attendu:0,percu:0});
  const restant=stats.attendu-stats.percu;
  const taux=stats.attendu?Math.round((stats.percu/stats.attendu)*100):0;

  const openEdit=s=>{setEditPai(s);setPForm({...(s.paiements||{})});};
  const savePai=()=>{
    setStudents(p=>p.map(s=>s.id===editPai.id?{...s,paiements:pForm}:s));
    toast("Paiements mis à jour ✓","success");setEditPai(null);
  };
  const up=k=>e=>setPForm(p=>({...p,[k]:e.target.value}));

  const getNivFrais=s=>FRAIS_SCOLARITE[getNiveau(s.classe)]||FRAIS_SCOLARITE["5ème"];
  const totalEleve=s=>{
    const f=getNivFrais(s);
    const p=s.paiements||{};
    let tot=0;
    if(p.inscription==="payé")tot+=f.inscription;
    if(p.tranche1==="payé")tot+=f.tranche1;
    if(p.tranche2==="payé")tot+=f.tranche2;
    if(p.tranche2==="partiel")tot+=Math.round(f.tranche2/2);
    if(p.tranche3==="payé")tot+=f.tranche3;
    return tot;
  };
  const duEleve=s=>{const f=getNivFrais(s);return f.inscription+f.tranche1+f.tranche2+f.tranche3;};

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Comptabilité Scolaire</h2>
        <div className="sub">Suivi des frais de scolarité — {list.length} élève(s)</div></div>
      <button className="btn b-gold" onClick={()=>toast("Export Excel — Module en développement","info")}>⬇️ Exporter</button>
    </div>

    {/* Stats financières */}
    <div className="sg mb3">
      {[
        {n:fmtXAF(stats.attendu),l:"Total attendu",i:"💼"},
        {n:fmtXAF(stats.percu),l:"Total perçu",i:"✅"},
        {n:fmtXAF(restant),l:"Reste à recouvrer",i:"⏳"},
        {n:`${taux}%`,l:"Taux recouvrement",i:"📊"},
        {n:students.filter(s=>!s.paiements||s.paiements.tranche1!=="payé").length,l:"Débiteurs T1",i:"🔴"},
        {n:students.filter(s=>s.paiements?.inscription==="payé"&&s.paiements?.tranche1==="payé"&&s.paiements?.tranche2==="payé").length,l:"À jour complets",i:"💚"},
      ].map((s,i)=><div className="sc" key={i}><div className="sc-i">{s.i}</div>
        <div className="sc-n" style={{fontSize:typeof s.n==="string"&&s.n.length>8?"1rem":undefined}}>{s.n}</div>
        <div className="sc-l">{s.l}</div></div>)}
    </div>

    <div className="pb mb3" style={{height:8}}>
      <div className="pf" style={{width:`${taux}%`}}/>
    </div>

    {/* Grille tarifaire */}
    <div className="card mb3">
      <h3 style={{fontSize:".95rem",marginBottom:12}}>📋 Grille tarifaire par niveau</h3>
      <div style={{overflowX:"auto"}}>
        <table style={{fontSize:".78rem"}}><thead><tr><th>Niveau</th><th>Inscription</th><th>1ère Tranche</th><th>2ème Tranche</th><th>3ème Tranche</th><th>Total annuel</th></tr></thead>
        <tbody>{Object.entries(FRAIS_SCOLARITE).map(([niv,f])=><tr key={niv}>
          <td><span className="chip c-info">{niv}</span></td>
          <td style={{fontWeight:600}}>{fmtXAF(f.inscription)}</td>
          <td style={{fontWeight:600}}>{fmtXAF(f.tranche1)}</td>
          <td style={{fontWeight:600}}>{fmtXAF(f.tranche2)}</td>
          <td style={{fontWeight:600}}>{fmtXAF(f.tranche3)}</td>
          <td style={{fontWeight:700,color:"var(--gold)"}}>{fmtXAF(f.inscription+f.tranche1+f.tranche2+f.tranche3)}</td>
        </tr>)}</tbody></table>
      </div>
    </div>

    {/* Filtres */}
    <div className="card mb3" style={{padding:"10px 14px"}}>
      <div className="row g2" style={{flexWrap:"wrap"}}>
        <input style={{width:200}} placeholder="🔍 Nom, matricule…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select style={{width:140}} value={fC} onChange={e=>setFC(e.target.value)}>
          <option value="">Toutes classes</option>{CLASSES_IPMN.map(c=><option key={c.id}>{c.nom}</option>)}</select>
        <select style={{width:160}} value={fPai} onChange={e=>setFPai(e.target.value)}>
          <option value="">Tous états</option>
          <option value="ok">À jour (tout payé)</option>
          <option value="retard">En retard</option>
          <option value="zero">Aucun paiement</option>
        </select>
        <button className="btn b-ghost b-sm" onClick={()=>{setSearch("");setFC("");setFPai("");}}>✕</button>
      </div>
    </div>

    {/* Tableau des paiements */}
    <div className="tw">
      <table><thead><tr><th>Matricule</th><th>Élève</th><th>Classe</th><th>Inscript.</th><th>T1</th><th>T2</th><th>T3</th><th>Perçu</th><th>Reste</th><th>Actions</th></tr></thead>
      <tbody>
        {list.length===0?<tr><td colSpan={10}><div className="empty"><div className="ei">💰</div>Aucun résultat</div></td></tr>:
        list.map(s=>{
          const p=s.paiements||{};
          const perc=totalEleve(s);
          const du=duEleve(s);
          const reste=du-perc;
          return <tr key={s.id}>
            <td><span className="tag" style={{fontSize:".6rem"}}>{s.matricule}</span></td>
            <td><div className="row g2"><Av prenom={s.prenom||s.nom} nom={s.nom} size={26}/>
              <span style={{marginLeft:7,fontWeight:500,fontSize:".8rem"}}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom}</span></div></td>
            <td className="sub">{s.classe}</td>
            {["inscription","tranche1","tranche2","tranche3"].map(k=>
              <td key={k} style={{textAlign:"center"}}>
                <span className={`chip ${paiChip(p[k]||"non")}`} style={{fontSize:".6rem"}}>
                  {p[k]==="payé"?"✓":p[k]==="partiel"?"~":"✗"}
                </span></td>)}
            <td style={{fontWeight:700,color:"var(--ok)",fontSize:".82rem"}}>{fmtXAF(perc)}</td>
            <td style={{fontWeight:700,color:reste>0?"var(--err)":"var(--ok)",fontSize:".82rem"}}>{reste>0?fmtXAF(reste):"—"}</td>
            <td><button className="btn b-out b-xs" onClick={()=>openEdit(s)}>✏️</button></td>
          </tr>;
        })}
      </tbody></table>
    </div>

    {/* Modal édition paiements */}
    {editPai&&<Modal title={`💰 Paiements — ${editPai.prenom||""} ${editPai.nom}`} onClose={()=>setEditPai(null)}>
      <div className="info-box mb3">
        Niveau : <strong>{getNiveau(editPai.classe)}</strong> · Classe : <strong>{editPai.classe}</strong> · Matricule : <strong>{editPai.matricule}</strong>
      </div>
      {(()=>{
        const f=getNivFrais(editPai);
        return <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {[
            {k:"inscription",l:"Inscription",m:f.inscription},
            {k:"tranche1",l:"1ère Tranche",m:f.tranche1},
            {k:"tranche2",l:"2ème Tranche",m:f.tranche2},
            {k:"tranche3",l:"3ème Tranche",m:f.tranche3},
          ].map(item=><div key={item.k} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
            background:"var(--s2)",borderRadius:"var(--rs)",border:"1px solid rgba(255,255,255,.05)"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:".84rem"}}>{item.l}</div>
              <div className="sub" style={{fontSize:".72rem"}}>{fmtXAF(item.m)}</div>
            </div>
            <select value={pForm[item.k]||"non"} onChange={up(item.k)} style={{width:140}}>
              <option value="non">✗ Non payé</option>
              <option value="partiel">~ Paiement partiel</option>
              <option value="payé">✓ Payé intégralement</option>
            </select>
          </div>)}
        </div>;
      })()}
      <div className="sep"/>
      <div className="ci">
        <div className="rowb">
          <span style={{fontWeight:600}}>Total perçu après enregistrement</span>
          <span style={{fontWeight:700,color:"var(--ok)"}}>
            {fmtXAF(["inscription","tranche1","tranche2","tranche3"].reduce((acc,k)=>{
              const f=getNivFrais(editPai);
              const montants={inscription:f.inscription,tranche1:f.tranche1,tranche2:f.tranche2,tranche3:f.tranche3};
              return acc+(pForm[k]==="payé"?montants[k]:pForm[k]==="partiel"?Math.round(montants[k]/2):0);
            },0))}
          </span>
        </div>
      </div>
      <div className="row g2 mt3" style={{justifyContent:"flex-end"}}>
        <button className="btn b-ghost" onClick={()=>setEditPai(null)}>Annuler</button>
        <button className="btn b-gold" onClick={savePai}>Enregistrer les paiements</button>
      </div>
    </Modal>}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   ABSENCES
   ══════════════════════════════════════════════════════════ */
function Absences(){
  const {students,absences,setAbsences,toast}=useApp();
  const [modal,setModal]=useState(false);
  const [f,setF]=useState({eleve:STUDENTS_INIT[0]?.id||"",date:"",heure:"7h30",motif:"",type:"Absence",justifie:false});
  const up=k=>e=>setF(p=>({...p,[k]:e.target.type==="checkbox"?e.target.checked:e.target.value}));
  const add=()=>{setAbsences(p=>[...p,{...f,id:`AB${Date.now()}`}]);toast("Signalement enregistré","success");setModal(false);};
  const toggle=id=>setAbsences(p=>p.map(a=>a.id===id?{...a,justifie:!a.justifie}:a));
  const del=id=>{setAbsences(p=>p.filter(a=>a.id!==id));toast("Supprimé","warn");};
  const findSt=id=>students.find(s=>s.id===id);
  const nj=absences.filter(a=>!a.justifie).length;
  const countAbs=sid=>absences.filter(a=>a.eleve===sid&&a.type==="Absence").length;
  const HEURES=["7h30","8h25","9h25","10h20","11h15","13h30","14h25","15h20"];

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Gestion des absences</h2>
        <div className="sub">{absences.length} signalement(s) · <span style={{color:"var(--err)"}}>{nj} non justifiée(s)</span></div></div>
      <button className="btn b-gold" onClick={()=>setModal(true)}>+ Signaler</button>
    </div>
    <div className="sg mb3">
      {[{n:absences.length,l:"Total",i:"📋"},{n:absences.filter(a=>a.type==="Absence").length,l:"Absences",i:"❌"},
        {n:absences.filter(a=>a.type==="Retard").length,l:"Retards",i:"⏰"},{n:nj,l:"Non justifiées",i:"🔴"}]
        .map((s,i)=><div className="sc" key={i}><div className="sc-i">{s.i}</div><div className="sc-n">{s.n}</div><div className="sc-l">{s.l}</div></div>)}
    </div>
    <div className="tw mb3">
      <table><thead><tr><th>Élève</th><th>Classe</th><th>Date</th><th>Heure</th><th>Type</th><th>Motif</th><th>Justifié</th><th>Actions</th></tr></thead>
      <tbody>
        {absences.length===0?<tr><td colSpan={8}><div className="empty"><div className="ei">✅</div>Aucune absence</div></td></tr>:
        absences.map(a=>{const st=findSt(a.eleve);return <tr key={a.id}>
          <td>{st?<div className="row g2"><Av prenom={st.prenom||st.nom} nom={st.nom} size={26}/>
            <span style={{marginLeft:7,fontWeight:500,fontSize:".8rem"}}>{st.prenom?`${st.prenom} ${st.nom}`:st.nom}</span></div>:a.eleve}</td>
          <td className="sub">{st?.classe}</td><td className="sub">{a.date}</td><td className="sub">{a.heure}</td>
          <td><span className={`chip ${a.type==="Absence"?"c-err":"c-warn"}`}>{a.type}</span></td>
          <td className="sub">{a.motif||"—"}</td>
          <td><span className={`chip ${a.justifie?"c-ok":"c-err"}`} style={{cursor:"pointer"}} onClick={()=>toggle(a.id)}>
            {a.justifie?"✓ Oui":"✗ Non"}</span></td>
          <td><button className="btn b-err b-xs" onClick={()=>del(a.id)}>🗑️</button></td>
        </tr>;})}
      </tbody></table>
    </div>
    <div className="card">
      <h3 style={{fontSize:".95rem",marginBottom:12}}>⚠️ Élèves à convoquer (≥ 2 absences)</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
        {students.filter(s=>countAbs(s.id)>=2).map(s=><div className="ci" key={s.id} style={{borderLeft:"3px solid var(--err)"}}>
          <div className="row g2"><Av prenom={s.prenom||s.nom} nom={s.nom} size={26}/>
            <div style={{marginLeft:8}}><div style={{fontWeight:500,fontSize:".8rem"}}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom}</div>
              <div className="sub" style={{fontSize:".68rem"}}>{s.classe} · {countAbs(s.id)} absences</div></div></div>
        </div>)}
        {students.filter(s=>countAbs(s.id)>=2).length===0&&<div className="sub">Aucun élève concerné.</div>}
      </div>
    </div>
    {modal&&<Modal title="➕ Signaler une absence / retard" onClose={()=>setModal(false)}>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div className="fg"><label>Élève</label>
          <select value={f.eleve} onChange={up("eleve")}>
            {students.map(s=><option key={s.id} value={s.id}>{s.prenom?`${s.prenom} ${s.nom}`:s.nom} ({s.classe})</option>)}</select></div>
        <div className="fg2">
          <div className="fg"><label>Date</label><input type="date" value={f.date} onChange={up("date")}/></div>
          <div className="fg"><label>Heure</label><select value={f.heure} onChange={up("heure")}>{HEURES.map(h=><option key={h}>{h}</option>)}</select></div>
          <div className="fg"><label>Type</label><select value={f.type} onChange={up("type")}><option>Absence</option><option>Retard</option></select></div>
          <div className="fg"><label>Motif</label><input placeholder="Maladie, RDV…" value={f.motif} onChange={up("motif")}/></div>
        </div>
        <div className="row g2" style={{alignItems:"center"}}>
          <input type="checkbox" id="just" checked={f.justifie} onChange={up("justifie")}/>
          <label htmlFor="just" style={{cursor:"pointer",color:"var(--tx)"}}>Absence justifiée (document fourni)</label></div>
      </div>
      <div className="row g2 mt3" style={{justifyContent:"flex-end"}}>
        <button className="btn b-ghost" onClick={()=>setModal(false)}>Annuler</button>
        <button className="btn b-gold" onClick={add}>Enregistrer</button>
      </div>
    </Modal>}
  </div>;
}

       <div className="row g2 mb3"><span className="step-num">3</span><div>Cochez <strong>"Public"</strong> et cochez <strong>"Add a README file"</strong></div></div>
       <div className="row g2 mb3"><span className="step-num">4</span><div>Cliquez sur <strong>"Create repository"</strong></div></div>
     </div>},
    {titre:"Uploader le fichier HTML",
     contenu:<div>
       <div className="row g2 mb3"><span className="step-num">1</span><div>Dans votre dépôt, cliquez sur <strong>"Add file"</strong> → <strong>"Upload files"</strong></div></div>
       <div className="row g2 mb3"><span className="step-num">2</span><div>Glissez le fichier <code style={{background:"var(--s3)",padding:"1px 5px",borderRadius:3}}>lyceegest.html</code> dans la zone</div></div>
       <div className="row g2 mb3"><span className="step-num">3</span><div>⚠️ Renommez-le <strong>OBLIGATOIREMENT</strong> en <strong>index.html</strong> avant d'uploader</div></div>
       <div className="row g2 mb3"><span className="step-num">4</span><div>Cliquez <strong>"Commit changes"</strong></div></div>
       <div className="err-box">⚠️ Le fichier doit s'appeler exactement <strong>index.html</strong> (pas lyceegest.html)</div>
     </div>},
    {titre:"Activer GitHub Pages",
     contenu:<div>
       <div className="row g2 mb3"><span className="step-num">1</span><div>Dans votre dépôt, cliquez sur <strong>"Settings"</strong> (onglet en haut)</div></div>
       <div className="row g2 mb3"><span className="step-num">2</span><div>Dans le menu de gauche, cliquez sur <strong>"Pages"</strong></div></div>
       <div className="row g2 mb3"><span className="step-num">3</span><div>Sous "Source", sélectionnez <strong>"Deploy from a branch"</strong></div></div>
       <div className="row g2 mb3"><span className="step-num">4</span><div>Branch : <strong>main</strong> · Folder : <strong>/ (root)</strong> → Cliquez <strong>"Save"</strong></div></div>
       <div className="row g2 mb3"><span className="step-num">5</span><div>Attendez ~2 minutes, puis votre URL sera :<div className="code-block" style={{margin:"8px 0"}}>https://VOTRE-USERNAME.github.io/ipmn-gestion/</div></div></div>
       <div className="ok-box">🎉 Votre site IPMN est maintenant en ligne et accessible depuis n'importe où !</div>
     </div>},
    {titre:"Modifier le code facilement",
     contenu:<div>
       <div className="info-box mb3">Pour modifier le site, vous n'avez pas besoin de compiler. Tout est dans le fichier <strong>index.html</strong>.</div>
       <div className="row g2 mb3"><span className="step-num">1</span><div><strong>Sur GitHub directement</strong> : cliquez sur <code>index.html</code> → cliquez sur ✏️ → modifiez → "Commit changes"</div></div>
       <div className="row g2 mb3"><span className="step-num">2</span><div><strong>Sur VSCode</strong> : ouvrez le fichier, modifiez, sauvegardez, puis re-uploadez sur GitHub</div></div>
       <div className="sep"/>
       <h4 style={{fontSize:".88rem",marginBottom:8}}>📍 Où modifier les données dans le code ?</h4>
       {[
         {section:"SCHOOL_INFO_DEFAULT",desc:"Nom, adresse, téléphone, email, proviseure"},
         {section:"CLASSES_IPMN",desc:"Liste complète des classes IPMN"},
         {section:"MATIERES_APC",desc:"Matières, couleurs et coefficients"},
         {section:"FRAIS_SCOLARITE",desc:"Montants des frais par niveau"},
         {section:"STUDENTS_INIT",desc:"Données initiales des élèves"},
         {section:"PROFS_INIT",desc:"Données des enseignants"},
       ].map(r=><div key={r.section} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
         <code style={{background:"var(--s3)",padding:"2px 7px",borderRadius:3,fontSize:".72rem",color:"var(--gold)",flexShrink:0}}>{r.section}</code>
         <span className="sub" style={{fontSize:".76rem"}}>{r.desc}</span>
       </div>)}
     </div>},
  ];

  return <div>
    <h2 style={{fontSize:"1.15rem",marginBottom:18}}>🌐 Hébergement GitHub Pages</h2>
    {/* Barre de progression */}
    <div className="row g2 mb4" style={{flexWrap:"wrap"}}>
      {etapes.map((e,i)=><div key={i} className="row g2" style={{cursor:"pointer"}} onClick={()=>setEtape(i)}>
        <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
          background:i<=etape?"var(--gold)":"var(--s3)",color:i<=etape?"#fff":"var(--sub)",fontWeight:700,fontSize:".78rem",flexShrink:0}}>
          {i<etape?"✓":i+1}</div>
        {i<etapes.length-1&&<div style={{width:24,height:2,background:i<etape?"var(--gold)":"var(--s3)",flexShrink:0}}/>}
      </div>)}
    </div>

    <div className="card">
      <div className="rowb mb3">
        <h3 style={{fontSize:"1rem"}}>Étape {etape+1} — {etapes[etape].titre}</h3>
        <div className="row g2">
          {etape>0&&<button className="btn b-out b-sm" onClick={()=>setEtape(e=>e-1)}>← Précédente</button>}
          {etape<etapes.length-1&&<button className="btn b-gold b-sm" onClick={()=>setEtape(e=>e+1)}>Suivante →</button>}

      {etapes[etape].contenu}

}

/* ══════════════════════════════════════════════════════════
   PARAMÈTRES ADMIN
   ══════════════════════════════════════════════════════════ */
function Parametres({user}){
  const {schoolInfo,setSchoolInfo,toast}=useApp();
  const [f,setF]=useState({...schoolInfo});
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const save=()=>{setSchoolInfo(f);toast("Paramètres enregistrés ✓","success");};

  return <div>
    <h2 style={{fontSize:"1.15rem",marginBottom:18}}>⚙️ Paramètres du système</h2>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div className="card">
        <h3 style={{fontSize:".95rem",marginBottom:14}}>🏫 Informations de l'établissement</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[{k:"nom",l:"Nom complet"},{k:"sigle",l:"Sigle"},{k:"adresse",l:"Adresse"},
            {k:"tel",l:"Téléphone"},{k:"email",l:"Email"},{k:"fondation",l:"Fondation"},
            {k:"proviseure",l:"Proviseure"},{k:"annee",l:"Année scolaire"},{k:"trimestre",l:"Trimestre en cours"}]
            .map(field=><div className="fg" key={field.k}>
              <label>{field.l}</label><input value={f[field.k]||""} onChange={up(field.k)}/></div>)}
          <button className="btn b-gold mt1" onClick={save}>💾 Enregistrer</button>
        </div>
      </div>
      <div>
        <div className="card mb3">
          <h3 style={{fontSize:".95rem",marginBottom:14}}>🔐 Mon compte</h3>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div className="fg"><label>Nom</label><input defaultValue={user.nom}/></div>
            <div className="fg"><label>Prénom</label><input defaultValue={user.prenom}/></div>
            <div className="fg"><label>Email</label><input defaultValue={user.email}/></div>
            <div className="fg"><label>Nouveau mot de passe</label><input type="password" placeholder="••••••••"/></div>
            <div className="fg"><label>Confirmer</label><input type="password" placeholder="••••••••"/></div>
            <button className="btn b-gold mt1">🔑 Modifier</button>
          </div>
        </div>
        <div className="card">
          <h3 style={{fontSize:".95rem",marginBottom:10}}>📋 Système</h3>
          <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:".8rem"}}>
            {[{l:"Version",v:"2.0 — IPMN"},{l:"Technologie",v:"HTML + React (CDN)"},{l:"Hébergement",v:"GitHub Pages (gratuit)"},{l:"Données",v:"Stockage local (navigateur)"}]
              .map(r=><div className="rowb" key={r.l} style={{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                <span className="sub">{r.l}</span><span style={{fontWeight:600}}>{r.v}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   PROFIL ÉLÈVE
   ══════════════════════════════════════════════════════════ */
function ProfilEleve({user}){
  const {students,schoolInfo}=useApp();
  const me=students.find(s=>s.email===user.email)||students[0];
  if(!me)return <div className="empty"><div className="ei">👤</div>Profil introuvable</div>;
  const moy=calcMoyNote(me.notes||{});
  const p=me.paiements||{};
  const niv=getNiveau(me.classe)||"5ème";
  const frais=FRAIS_SCOLARITE[niv]||FRAIS_SCOLARITE["5ème"];

  return <div>
    <div className="card mb3" style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap"}}>
      <Av prenom={me.prenom||me.nom} nom={me.nom} size={66}/>
      <div style={{flex:1}}>
        <h2 style={{fontSize:"1.4rem"}}>{me.prenom} {me.nom}</h2>
        <div className="sub mt1">{me.matricule} · {me.email}</div>
        <div className="row g2 mt2">
          <span className={`chip ${sc_chip(me.statut)}`}>{me.statut}</span>
          <span className="chip c-info">{me.classe}</span>
          <span className="chip c-gold">{schoolInfo.annee}</span>
        </div>
      </div>
      <div style={{textAlign:"center",padding:"11px 20px",background:"var(--s2)",borderRadius:"var(--r)"}}>
        <div style={{fontSize:"2rem",fontWeight:700,fontFamily:"'Playfair Display',serif",color:nc(parseFloat(moy))}}>{moy}</div>
        <div className="sub" style={{fontSize:".7rem"}}>/20 — Moy. générale</div>
      </div>
    </div>

    <h3 style={{fontSize:".95rem",marginBottom:12}}>📊 Mes résultats (Paliers APC)</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:11,marginBottom:20}}>
      {Object.entries(me.notes||{}).filter(([,n])=>n.p1||n.p2).map(([m,n])=>{
        const best=Math.max(n.p1||0,n.rp1||0);
        const vals=[best,n.p2,n.dm].filter(x=>x>0);
        const mo=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"-";
        const col=MATIERES_APC[m]?.color||"var(--gold)";
        return <div className="card" key={m} style={{textAlign:"center"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:col,margin:"0 auto 6px"}}/>
          <div style={{fontSize:"1.6rem",fontWeight:700,color:nc(parseFloat(mo))}}>{mo}</div>
          <div style={{fontSize:".72rem",fontWeight:600,color:"var(--sub)"}}>/20 · {m}</div>
          <div className="pb mt2"><div className="pf" style={{width:`${parseFloat(mo)/20*100}%`,background:parseFloat(mo)>=10?col:"var(--err)"}}/></div>
          <div className="row g1 mt2" style={{justifyContent:"center"}}>
            <span className="tag" style={{fontSize:".6rem"}}>P1:{n.p1||0}</span>
            <span className="tag" style={{fontSize:".6rem"}}>P2:{n.p2||0}</span>
          </div>
        </div>;
      })}
    </div>

    <h3 style={{fontSize:".95rem",marginBottom:12}}>💰 Mes paiements</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
      {[{k:"inscription",l:"Inscription",m:frais.inscription},{k:"tranche1",l:"Tranche 1",m:frais.tranche1},{k:"tranche2",l:"Tranche 2",m:frais.tranche2},{k:"tranche3",l:"Tranche 3",m:frais.tranche3}]
        .map(item=><div className="ci" key={item.k} style={{textAlign:"center",borderBottom:`3px solid ${p[item.k]==="payé"?"var(--ok)":p[item.k]==="partiel"?"var(--warn)":"var(--err)"}`}}>
          <div style={{fontWeight:600,fontSize:".82rem"}}>{item.l}</div>
          <div className="sub" style={{fontSize:".7rem"}}>{fmtXAF(item.m)}</div>
          <span className={`chip mt2 ${paiChip(p[item.k]||"non")}`}>{paiLabel(p[item.k]||"non")}</span>
        </div>)}
    </div>
  </div>;
}

   NAVIGATION IPMN
   ══════════════════════════════════════════════════════════ */

    {sec:"Vue d'ensemble",items:[{id:"dash",ic:"📊",l:"Tableau de bord"}]},
    {sec:"Scolarité",items:[

    ]},

    ]},

    {sec:"Administration",items:[

  ],

    {sec:"Espace prof",items:[{id:"notes",ic:"📝",l:"Notes APC"},{id:"absences",ic:"📅",l:"Absences"},{id:"annonces",ic:"📣",l:"Annonces"}]},

    {sec:"Mon espace",items:[{id:"profil",ic:"👤",l:"Mon profil"},{id:"annonces",ic:"📣",l:"Annonces"}]},

const TITLES={dash:"Tableau de bord",eleves:"Gestion des élèves",notes:"Notes APC — Paliers",
  conseil:"Conseil de classe",absences:"Absences",compta:"Comptabilité scolaire",
  annonces:"Annonces & Agenda",params:"Paramètres",github:"Hébergement GitHub Pages",profil:"Mon profil"};

/* ══════════════════════════════════════════════════════════
   ANNONCES (simple)
   ══════════════════════════════════════════════════════════ */
function Annonces(){
  const [anns,setAnns]=useState(ANNONCES_INIT);
  const [modal,setModal]=useState(false);
  const [f,setF]=useState({titre:"",date:"",type:"Réunion",cible:"Tous",contenu:"",auteur:"Direction"});
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const add=()=>{setAnns(p=>[...p,{...f,id:p.length+1}]);setModal(false);};
  const tc={Examen:"c-err",Bulletin:"c-ok",Conseil:"c-gold",Réunion:"c-info",Administratif:"c-purple"};

  return <div>
    <div className="rowb mb3">
      <div><h2 style={{fontSize:"1.15rem"}}>Annonces & Agenda</h2><div className="sub">{anns.length} annonce(s)</div></div>
      <button className="btn b-gold" onClick={()=>setModal(true)}>+ Nouvelle annonce</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:13}}>
      {anns.map(a=><div className="card" key={a.id} style={{borderTop:"3px solid var(--gold)"}}>
        <div className="rowb mb2">
          <span className={`chip ${tc[a.type]||"c-gold"}`}>{a.type}</span>
          <span className="sub" style={{fontSize:".68rem"}}>{a.date}</span>
        </div>
        <h3 style={{fontSize:".95rem",marginBottom:6}}>{a.titre}</h3>
        <div className="sub" style={{fontSize:".78rem",lineHeight:1.6,marginBottom:9}}>{a.contenu}</div>
        <div className="row g2 sub" style={{fontSize:".68rem"}}>
          <span>👤 {a.auteur}</span><span>·</span><span>🎯 {a.cible}</span>
        </div>
      </div>)}
    </div>
    {modal&&<Modal title="📣 Nouvelle annonce" onClose={()=>setModal(false)}>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div className="fg"><label>Titre</label><input value={f.titre} onChange={up("titre")}/></div>
        <div className="fg2">
          <div className="fg"><label>Date</label><input type="date" value={f.date} onChange={up("date")}/></div>
          <div className="fg"><label>Type</label><select value={f.type} onChange={up("type")}><option>Réunion</option><option>Examen</option><option>Bulletin</option><option>Conseil</option><option>Administratif</option></select></div>
          <div className="fg"><label>Cible</label><select value={f.cible} onChange={up("cible")}><option>Tous</option><option>Terminales</option><option>Premières</option><option>Secondes</option><option>3ème</option><option>5ème</option><option>6ème</option><option>Enseignants</option></select></div>
          <div className="fg"><label>Auteur</label><input value={f.auteur} onChange={up("auteur")}/></div>
        </div>
        <div className="fg"><label>Contenu</label><textarea rows={4} value={f.contenu} onChange={up("contenu")}/></div>
      </div>
      <div className="row g2 mt3" style={{justifyContent:"flex-end"}}>
        <button className="btn b-ghost" onClick={()=>setModal(false)}>Annuler</button>
        <button className="btn b-gold" onClick={add}>Publier</button>
      </div>
    </Modal>}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   APP ROOT
   ══════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dash");
  const [students,setStudents]=useState(STUDENTS_INIT);
  const [profs,setProfs]=useState(PROFS_INIT);
  const [absences,setAbsences]=useState(ABSENCES_INIT);
  const [schoolInfo,setSchoolInfo]=useState(SCHOOL_INFO_DEFAULT);
  const [tst,setTst]=useState(null);

  const toast=(msg,type="info")=>setTst({msg,type});
  const logout=()=>{setUser(null);setPage("dash");};
  const defaultPage=r=>r==="eleve"?"profil":r==="comptable"?"compta":"dash";

  const renderPage=()=>{
    switch(page){
      case"dash":    return <Dashboard/>;
      case"eleves":  return <Eleves/>;
      case"notes":   return <Notes/>;
      case"conseil": return <ConseilClasse/>;
      case"absences":return <Absences/>;
      case"compta":  return <Comptabilite/>;
      case"annonces":return <Annonces/>;
      case"params":  return <Parametres user={user}/>;
      case"github":  return <GuideHebergement/>;
      case"profil":  return <ProfilEleve user={user}/>;
      default:       return <div className="empty"><div className="ei">🚧</div>Module en cours de développement</div>;
    }
  };

  if(!user)return <Auth onLogin={u=>{setUser(u);setPage(defaultPage(u.role));}}/>;

  const nav=NAV[user.role]||NAV.eleve;

  return <Ctx.Provider value={{students,setStudents,profs,setProfs,absences,setAbsences,schoolInfo,setSchoolInfo,toast}}>
    <div className="shell">
      {/* ── SIDEBAR ── */}
      <aside className="sidebar">
        <div className="sb-logo">
          <div className="logo-icon">🏫</div>
          <h2>Inst. Privée<br/>Marie NDZABA</h2>
          <p>Franceville, Gabon</p>
          <div className="badge-ipmn">IPMN · {schoolInfo.annee}</div>
        </div>
        <div className="sb-nav">
          {nav.map(sec=><div key={sec.sec}>
            <div className="sb-sec">{sec.sec}</div>
            {sec.items.map(it=><div key={it.id} className={`sb-item${page===it.id?" on":""}`} onClick={()=>setPage(it.id)}>
              <span className="ic">{it.ic}</span>
              <span>{it.l}</span>
              {it.badge&&<span className="pill">{it.badge}</span>}
            </div>)}
          </div>)}
        </div>
        <div className="sb-foot">
          <Av prenom={user.prenom||user.nom||"?"} nom={user.nom||""} size={30}/>
          <div style={{flex:1,overflow:"hidden",marginLeft:7}}>
            <div style={{fontWeight:600,fontSize:".8rem",color:"var(--tx)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {user.prenom?`${user.prenom} ${user.nom}`:user.nom}</div>
            <div className="sub" style={{fontSize:".65rem",textTransform:"capitalize"}}>{user.poste||user.role}</div>
          </div>
          <button className="btn b-ghost b-ic" title="Déconnexion" onClick={logout}>↩</button>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <div className="main">
        <div className="topbar">
          <h1>{TITLES[page]||"IPMN"}</h1>
          <div className="row g3">
            <span className="sub" style={{fontSize:".74rem"}}>Année {schoolInfo.annee} · {schoolInfo.trimestre}</span>
            <span className="chip c-gold" style={{textTransform:"capitalize"}}>{user.poste||user.role}</span>
          </div>
        </div>
        <div className="page">{renderPage()}</div>
      </div>
    </div>
    {tst&&<Toast msg={tst.msg} type={tst.type} onClose={()=>setTst(null)}/>}
  </Ctx.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
